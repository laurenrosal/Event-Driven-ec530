name: CI

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install flake8
        run: pip install flake8

      - name: Check code style (flake8)
        run: |
          flake8 Services/ Messaging/ databases/ \
            --max-line-length=120 \
            --exclude=__pycache__ \
            --ignore=E501,W503,E302,E303,E305,E221,W291,W292,W293,F841

      - name: Check syntax (import check)
        run: |
          python -m py_compile Services/cli_service/cli.py
          python -m py_compile Services/upload_service/upload_service.py
          python -m py_compile Services/image_processing_service/image_processing_service.py
          python -m py_compile Services/annotation_service/annotation_service.py
          python -m py_compile Services/embedding_service/embedding_service.py
          python -m py_compile Services/query_service/query_service.py
          python -m py_compile Messaging/broker.py
          python -m py_compile Messaging/topics.py
          python -m py_compile databases/document_db/document_db.py
          python -m py_compile databases/vector_db/vector_db.py
